baseurl: https://mumeinosato.com/
languageCode: ja
defaultContentLanguage: ja
hasCJKLanguage: true
title: "mumeinosato Lab"
theme: "stack"
enableRobotsTXT: false

params:
  favicon: "/favicon.ico"

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04"

  sidebar:
    avatar: "img/avatar.png"

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  comments:
    enabled: false

  opengraph:
    enabled: true

menu:
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/mumeinosato
      params:
        icon: brand-github

    - identifier: twitter
      name: Twitter
      url: https://twitter.com/mumeinosato
      params:
        icon: brand-twitter

sitemap:
  changefreq: "weekly"
  priority: 0.5

permalinks:
  post: "/post/:slug/"
  page: "/:slug/"

markup:  
  goldmark:
    renderer:
      unsafe: true

  tableOfContents:  
    endLevel: 4
    ordered: true
    startLevel: 2

googleAnalytics: G-058Y2W25JY